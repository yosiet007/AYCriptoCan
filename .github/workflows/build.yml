name: Build AYCriptoCan

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Free Pascal
      run: |
        sudo apt-get update
        sudo apt-get install -y fpc

    - name: Compile Daemon
      run: |
        cd src
        fpc -O2 pascalcoin_daemon.pp

    - name: List output
      run: ls -la src/pascalcoin_daemon 2>/dev/null || echo "Build may have failed"

    - name: Upload artifact
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: aycritocan-daemon
        path: src/pascalcoin_daemon
