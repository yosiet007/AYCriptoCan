name: Build AYCriptoCan

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install Free Pascal
      run: |
        wget https://sourceforge.net/projects/freepascal/files/3.2.2/fpc-3.2.2.x86_64-linux.tar/download -O fpc.tar
        tar -xf fpc.tar
        export PATH="$PATH:/home/runner/fpc/bin"
        fpc -PB -Px86_64 -Tlinux src/pascalcoin_daemon.pp

    - name: Upload daemon
      uses: actions/upload-artifact@v4
      with:
        name: pascalcoin-daemon
        path: pascalcoin_daemon
