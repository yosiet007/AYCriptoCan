name: Build AYCriptoCan

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
    - uses: actions/checkout@v5

    - name: Install FPC
      run: |
        sudo apt-get update
        sudo apt-get install -y fpc
        which fpc
        fpc -v

    - name: List src files
      run: |
        ls -la src/

    - name: Compile
      run: |
        cd src
        fpc -O2 pascalcoin_daemon.pp 2>&1
        echo "Exit: $?"

    - name: Upload
      if: success()
      uses: actions/upload-artifact@v5
      with:
        name: aycritocan-daemon
        path: src/pascalcoin_daemon